/* ═══════════════════════════════════════════
   SLABHQ v5 — Alpine Journal Design System
   DM Serif Display + IBM Plex Mono
   Warm, refined, literary — premium field journal
   ═══════════════════════════════════════════ */

:root {
  --font-display: 'DM Serif Display', serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
  --ease-in: cubic-bezier(0.4, 0.0, 1, 1);
  --ease-std: cubic-bezier(0.4, 0.0, 0.2, 1);
  --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
  --r: 12px;
  --r-sm: 8px;
  --r-xs: 4px;
}

[data-theme="dark"] {
  --bg: #0c0b0a;
  --surface: #151412;
  --card: #1e1c1a;
  --card2: #232120;
  --border: #33302c;
  --border2: #3a3632;
  --accent: #c4956a;
  --accent2: #d4a87a;
  --accent-soft: rgba(196,149,106,0.1);
  --fresh: #6abf7b;
  --fresh-soft: rgba(106,191,123,0.1);
  --warn: #d4a03a;
  --warn-soft: rgba(212,160,58,0.08);
  --danger: #c95050;
  --danger-soft: rgba(201,80,80,0.08);
  --sky: #6aafc4;
  --sky-soft: rgba(106,175,196,0.1);
  --text: #eee6dc;
  --text2: #a89c90;
  --text3: #5a5048;
  --white: #f5efe8;
  --overlay: rgba(12,11,10,0.7);
}

[data-theme="light"] {
  --bg: #f7f3ee;
  --surface: #ede8e2;
  --card: #ffffff;
  --card2: #f5f1ec;
  --border: #ddd6cc;
  --border2: #c8c0b5;
  --accent: #8b5e3c;
  --accent2: #a06d48;
  --accent-soft: rgba(139,94,60,0.08);
  --fresh: #2d8a3e;
  --fresh-soft: rgba(45,138,62,0.08);
  --warn: #a07828;
  --warn-soft: rgba(160,120,40,0.06);
  --danger: #b83a3a;
  --danger-soft: rgba(184,58,58,0.06);
  --sky: #3a7f9a;
  --sky-soft: rgba(58,127,154,0.08);
  --text: #2a2420;
  --text2: #6a6058;
  --text3: #736b63;
  --white: #1a1614;
  --overlay: rgba(247,243,238,0.7);
}

/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--font-mono);font-size:13px;line-height:1.6;
  min-height:100dvh;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(64px + env(safe-area-inset-bottom,0px) + 28px);
  transition:background .3s var(--ease-std),color .3s var(--ease-std);
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
  .flake{display:none!important}
  .snow-wrap{display:none!important}
}

/* ── SKIP LINK ── */
.skip-link{position:absolute;top:-40px;left:0;padding:8px 16px;background:var(--accent);color:var(--bg);z-index:9999;font-size:12px;border-radius:0 0 8px 0;transition:top .2s}
.skip-link:focus{top:0}

/* ── SNOW PARTICLES ── */
.snow-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.flake{position:absolute;top:-12px;color:var(--text3);opacity:0.15;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* ═══ TOP BAR ═══ */
.top-bar{
  position:sticky;top:0;z-index:400;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
  background:color-mix(in srgb,var(--bg) 92%,transparent);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  transition:background .3s,border-color .3s;
}
.logo-group{display:flex;align-items:baseline;gap:8px}
.logo{font-family:var(--font-display);font-size:22px;color:var(--white)}
.logo-accent{color:var(--accent)}
.logo-tagline{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:0.5px;white-space:nowrap}
@media(max-width:360px){.logo-tagline{display:none}}
.top-actions{display:flex;align-items:center;gap:6px}
.top-btn{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;background:var(--card);border:1px solid var(--border);
  color:var(--text2);border-radius:8px;font-size:14px;
  transition:all .15s;
}
.top-btn:hover{border-color:var(--accent);color:var(--accent)}
.top-btn svg{width:16px;height:16px}

/* ── LANG DROPDOWN ── */
.lang-wrap{position:relative}
.lang-trigger{
  display:flex;align-items:center;gap:4px;
  padding:6px 10px;background:var(--card);border:1px solid var(--border);
  color:var(--text2);font-family:var(--font-mono);font-size:11px;
  border-radius:8px;cursor:pointer;transition:all .15s;
}
.lang-trigger:hover{border-color:var(--accent);color:var(--accent)}
.lang-trigger svg{width:10px;height:10px;transition:transform .2s}
.lang-wrap.open .lang-trigger svg{transform:rotate(180deg)}
.lang-menu{
  position:absolute;top:calc(100% + 6px);right:0;z-index:600;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:4px;min-width:140px;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  opacity:0;transform:translateY(-4px);pointer-events:none;
  transition:all .2s var(--ease-std);
}
.lang-wrap.open .lang-menu{opacity:1;transform:translateY(0);pointer-events:auto}
.lang-option{
  display:block;width:100%;padding:12px;background:none;border:none;
  color:var(--text2);font-family:var(--font-mono);font-size:11px;
  text-align:left;border-radius:var(--r-xs);cursor:pointer;
  transition:all .1s;min-height:44px;
}
.lang-option:hover{background:var(--accent-soft);color:var(--accent)}
.lang-option.active{color:var(--accent);font-weight:500}

/* ═══ CONTAINER ═══ */
.container{max-width:520px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
@media(min-width:768px){.container{max-width:680px}}
@media(min-width:1024px){.container{max-width:720px}}
@media(min-width:1024px){
  .bottom-nav{display:none!important}
  body{padding-bottom:0!important}
  .top-bar .top-desktop-nav{display:flex}
}
.top-desktop-nav{display:none;align-items:center;gap:4px;margin-left:24px}
.top-desktop-nav button{
  display:flex;align-items:center;gap:4px;padding:8px 14px;background:none;border:none;
  color:var(--text2);font-family:var(--font-mono);font-size:11px;cursor:pointer;
  border-radius:6px;transition:all .15s;
}
.top-desktop-nav button:hover{color:var(--accent);background:var(--accent-soft)}
.top-desktop-nav button.active{color:var(--accent);font-weight:600}
/* Responsive stat grid */
@media(max-width:380px){.detail-stats{grid-template-columns:repeat(2,1fr)}}

/* ═══ HEADER / DATE ═══ */
.page-header{padding:24px 0 8px}
.header-date{font-family:var(--font-display);font-size:26px;color:var(--white)}
.header-meta{display:flex;align-items:center;gap:10px;margin-top:4px}
.header-time{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.header-demo{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;color:var(--warn);background:var(--warn-soft);
  padding:3px 8px;border-radius:4px;
}
.header-demo::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--warn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══ SECTION LABELS ═══ */
.sec-label{
  font-size:10px;font-weight:500;color:var(--text3);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.sec-divider{height:1px;background:var(--border);margin:32px 0}

/* ═══ THIS WEEKEND HERO ═══ */
/* ═══ HOME ZONES ═══ */
.home-zone{margin:24px 0 28px}
.zone-header{margin-bottom:14px}
.zone-title{font-family:var(--font-display);font-size:22px;color:var(--white);display:flex;align-items:center;gap:8px}
.zone-subtitle{font-size:11px;color:var(--text2);margin-top:3px}

/* ── WEATHER OVERVIEW ── */
.wx-overview{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin:16px 0 24px;
  animation:reveal .5s var(--ease-out) .05s both;
  position:relative;overflow:hidden;
}
.wx-overview::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),transparent 80%);
}
.wx-eyebrow{font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.wx-headline{font-family:var(--font-display);font-size:20px;color:var(--white);line-height:1.3;margin-bottom:8px}
.wx-timeline{display:flex;margin:16px 0;position:relative}
.wx-phase{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:1}
.wx-phase-label{font-size:10px;color:var(--text3);letter-spacing:0.5px}
.wx-phase-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--card)}
.wx-phase-dot.active{background:var(--accent);border-color:var(--accent)}
.wx-phase-dot.past{background:var(--text3);border-color:var(--text3)}
.wx-phase-day{font-size:11px;font-weight:500;color:var(--text)}
/* Connecting line — positioned at the center of the dots */
.wx-timeline::before{content:'';position:absolute;top:24px;left:10%;right:10%;height:2px;background:var(--border);z-index:0}
.wx-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-top:10px}
.wx-summary strong{color:var(--text)}
.wx-source{font-size:10px;color:var(--text3);margin-top:8px}
.wx-source a{color:var(--accent)}

/* ── NEXT TRIP OUTLOOK ── */
.outlook-row{
  display:flex;flex-wrap:wrap;align-items:flex-start;gap:8px;
  padding:14px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;
  transition:all .15s;
}
.outlook-row:hover{border-color:var(--accent)}
.outlook-week{font-size:10px;color:var(--accent);font-weight:600;min-width:50px;padding-top:2px}
.outlook-info{flex:1;min-width:180px}
.outlook-title{font-size:12px;font-weight:500;color:var(--white);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.outlook-detail{font-size:10px;color:var(--text2);margin-top:4px}
.outlook-trend{font-size:11px;font-weight:500;min-width:40px;text-align:right}
.outlook-region-tag{font-size:8px;letter-spacing:.5px;padding:2px 6px;border-radius:3px;margin-left:4px}
@media(max-width:420px){.outlook-trend{width:100%;text-align:left;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}}
.outlook-resort-row{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:10px;color:var(--text2);min-height:44px}
.outlook-resort-row:hover{color:var(--accent);cursor:pointer}

/* ═══ RECOMMENDATION CARDS ═══ */
.rec-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:16px;
  overflow:hidden;
  transition:all .2s var(--ease-std);
  animation:reveal .4s var(--ease-out) both;
}
@keyframes reveal{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rec-card:nth-child(2){animation-delay:.1s}
.rec-card:nth-child(3){animation-delay:.15s}
.rec-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.rec-card.expanded{border-color:var(--accent)}
.rec-header{display:flex;align-items:center;gap:12px;padding:18px 16px;cursor:pointer}
.rec-category{
  font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;
  line-height:1;display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:3px;
}
.cat-ca{background:var(--sky-soft);color:var(--sky);border:1px solid rgba(106,175,196,0.2)}
.cat-us{background:var(--fresh-soft);color:var(--fresh);border:1px solid rgba(106,191,123,0.2)}
.cat-intl{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(196,149,106,0.2)}
.rec-score{
  font-family:var(--font-display);font-size:36px;color:var(--white);
  line-height:1;min-width:44px;flex-shrink:0;
}
.rec-info{flex:1;min-width:0}
.rec-name{font-family:var(--font-display);font-size:18px;color:var(--white);line-height:1.2}
.rec-sub{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rec-highlight{
  display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:4px;
  margin-top:6px;
}
.hl-go{background:var(--fresh-soft);color:var(--fresh)}
.hl-good{background:var(--sky-soft);color:var(--sky)}
.hl-ok{background:var(--warn-soft);color:var(--warn)}
.rec-chevron{color:var(--text3);font-size:12px;transition:transform .25s;flex-shrink:0}
.rec-card.expanded .rec-chevron{transform:rotate(180deg)}

/* ═══ EXPANDED DETAIL ═══ */
.rec-detail{max-height:0;overflow:hidden;transition:max-height .35s var(--ease-std)}
.rec-card.expanded .rec-detail{max-height:none}
.rec-detail-inner{padding:4px 16px 20px;border-top:1px solid var(--border)}

/* ── Storm Context ── */
.storm-context{
  padding:14px;background:var(--sky-soft);border:1px solid rgba(106,175,196,0.15);
  border-radius:var(--r-sm);margin:12px 0;font-size:11px;color:var(--text2);line-height:1.6;
}
.storm-context strong{color:var(--text)}
.storm-context .storm-label{font-size:10px;color:var(--sky);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}

.detail-narrative{
  font-size:12px;color:var(--text2);line-height:1.75;
  padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:12px;
}
.detail-narrative strong{color:var(--text)}

.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.d-stat{background:var(--card2);border-radius:var(--r-sm);padding:12px 10px}
.d-stat-label{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.d-stat-val{font-size:16px;font-weight:600;color:var(--white)}
.d-stat-link{color:var(--white);text-decoration:none;border-bottom:1px dashed var(--border2)}
.d-stat-link:hover{color:var(--accent);border-color:var(--accent)}

/* ── MAP ── */
.map-wrap{border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border);margin:10px 0}
.map-el{height:200px}
.leaflet-container{background:var(--bg)!important}
.leaflet-popup-content-wrapper{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:none}
.leaflet-popup-tip{background:var(--card)}

.drive-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0}
.drive-cell{background:var(--card2);border-radius:var(--r-sm);padding:10px}
.drive-label{font-size:10px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.drive-val{font-size:20px;font-weight:500;color:var(--white)}
.drive-note{font-size:10px;color:var(--text2);margin-top:2px}

/* ── CHAIN CONTROL ── */
.chain-alert{
  display:flex;gap:10px;padding:12px;
  background:var(--warn-soft);border:1px solid rgba(212,160,58,0.15);
  border-radius:var(--r-sm);margin:8px 0;
}
.chain-icon{flex-shrink:0;margin-top:1px;color:var(--warn)}
.chain-title{font-size:11px;font-weight:500;color:var(--warn)}
.chain-meta{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.5}
.chain-source{font-size:10px;color:var(--text3);margin-top:4px}
.chain-source a{color:var(--accent)}

/* ── DATA SOURCE ── */
.data-source{font-size:10px;color:var(--text3);margin-top:10px;display:flex;align-items:center;gap:4px}
.data-source a{color:var(--accent);display:inline-flex;align-items:center;gap:2px}

/* ── YOY COMPARISON ── */
.yoy-section{margin:12px 0;padding:12px 0;border-top:1px solid var(--border)}
.yoy-title{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.yoy-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.yoy-label{font-size:10px;color:var(--text2);min-width:80px}
.yoy-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;position:relative}
.yoy-fill{height:100%;border-radius:2px;transition:width .8s var(--ease-out)}
.yoy-val{font-size:10px;font-weight:500;min-width:40px;text-align:right}

/* ── SEASON OUTLOOK ── */
.season-outlook{
  padding:12px;background:var(--card2);border-radius:var(--r-sm);
  margin:10px 0;font-size:11px;color:var(--text2);line-height:1.6;
}
.season-outlook strong{color:var(--accent)}

/* ── CTA BUTTON ── */
.cta-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:14px;margin-top:12px;
  background:var(--accent);color:var(--bg);
  font-family:var(--font-mono);font-size:11px;font-weight:500;
  letter-spacing:1px;text-transform:uppercase;text-align:center;
  border:none;border-radius:var(--r-sm);transition:all .15s;
}
.cta-btn:hover{opacity:.85;transform:translateY(-1px)}
.cta-btn svg{width:14px;height:14px}
.ghost-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  padding:12px;
  background:none;border:1px solid var(--border);color:var(--text2);
  font-family:var(--font-mono);font-size:10px;letter-spacing:.5px;
  text-align:center;border-radius:var(--r-sm);transition:all .15s;
}
.ghost-btn:hover{border-color:var(--accent);color:var(--accent)}
.ghost-btn svg{width:12px;height:12px}

/* ═══ ALL RESORTS LIST ═══ */
.resort-row{
  display:flex;align-items:center;gap:10px;
  padding:14px 12px;border:1px solid var(--border);
  border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;
  transition:all .15s;
}
.resort-row:hover{border-color:var(--accent)}
.resort-row.closed-resort{opacity:.4;pointer-events:none}

/* Status background tint classes */
.status-bg-epic{background:color-mix(in srgb, var(--fresh) 6%, var(--card));border-left:3px solid var(--fresh)}
.status-bg-prime{background:color-mix(in srgb, var(--sky) 6%, var(--card));border-left:3px solid var(--sky)}
.status-bg-good{background:color-mix(in srgb, var(--accent) 6%, var(--card));border-left:3px solid var(--accent)}
.status-bg-limited{background:color-mix(in srgb, var(--warn) 6%, var(--card));border-left:3px solid var(--warn)}
.status-bg-closed{background:color-mix(in srgb, var(--text3) 4%, var(--card));border-left:3px solid var(--text3);opacity:0.5}

.rr-score{font-family:var(--font-display);font-size:22px;min-width:32px;color:var(--white);text-align:right;flex-shrink:0}
.rr-info{flex:1;min-width:0}
.rr-name{font-family:var(--font-display);font-size:14px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-meta{font-size:10px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-chip{
  font-size:8px;letter-spacing:.5px;padding:3px 8px;border-radius:3px;
  flex-shrink:0;
}
.ch-epic{background:var(--fresh-soft);color:var(--fresh)}
.ch-prime{background:var(--sky-soft);color:var(--sky)}
.ch-good{background:var(--accent-soft);color:var(--accent)}
.ch-limited{background:var(--warn-soft);color:var(--warn)}
.ch-closed{background:var(--danger-soft);color:var(--danger)}

.show-more-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:12px;margin-top:8px;
  background:var(--card);border:1px solid var(--border);color:var(--text2);
  font-family:var(--font-mono);font-size:11px;
  border-radius:var(--r-sm);transition:all .15s;cursor:pointer;
}
.show-more-btn:hover{border-color:var(--accent);color:var(--accent)}
.show-more-btn svg{width:14px;height:14px}

/* ── STATUS GROUP HEADER ── */
.status-group-header{
  font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;
  padding:10px 0 6px;margin-top:8px;display:flex;align-items:center;gap:6px;
}

/* ═══ LEGEND / KEY ═══ */
.legend-toggle{
  display:flex;align-items:center;gap:6px;
  padding:10px 12px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);margin-bottom:12px;cursor:pointer;
  font-size:11px;color:var(--text2);transition:all .15s;
}
.legend-toggle:hover{border-color:var(--accent);color:var(--accent)}
.legend-toggle svg{transition:transform .2s}
.legend-toggle.open svg{transform:rotate(180deg)}
.legend-body{
  max-height:0;overflow:hidden;transition:max-height .3s var(--ease-std);
}
.legend-body.open{max-height:400px}
.legend-content{
  padding:12px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);margin-bottom:12px;font-size:11px;color:var(--text2);line-height:1.8;
}
.legend-content strong{color:var(--text)}
.legend-content .legend-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.legend-content .legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ═══ EMAIL SUBSCRIPTION ═══ */
.email-card{
  background:var(--card);border:1px dashed var(--border2);
  border-radius:var(--r);padding:28px;margin-top:28px;text-align:center;
}
.email-eyebrow{font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.email-heading{font-family:var(--font-display);font-size:20px;color:var(--white);margin-bottom:4px}
.email-sub{font-size:12px;color:var(--text2);margin-bottom:14px}
.email-row{display:flex;gap:8px}
.email-input{
  flex:1;padding:12px 14px;background:var(--card2);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:12px;
  border-radius:var(--r-sm);outline:none;transition:border-color .15s;
}
.email-input::placeholder{color:var(--text3)}
.email-input:focus{border-color:var(--accent)}
.email-btn{
  padding:12px 18px;background:var(--accent);color:var(--bg);
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  letter-spacing:.5px;border:none;border-radius:var(--r-sm);
  white-space:nowrap;transition:opacity .15s;
}
.email-btn:hover{opacity:.85}
.email-success{display:none;font-size:12px;color:var(--fresh);padding:14px;display:flex;align-items:center;gap:6px;justify-content:center}
.email-success.show{display:flex}
.email-success{display:none}
.email-note{font-size:10px;color:var(--text3);margin-top:10px}
.alert-prefs{margin-top:12px;padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm)}
.alert-pref-title{font-size:10px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.alert-opt{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text);padding:8px 0;cursor:pointer;min-height:44px}
.alert-opt input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.alert-logic{margin-top:12px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm)}
.alert-logic-title{font-size:10px;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:4px;font-weight:500}
.alert-logic-item{font-size:10px;color:var(--text3);padding:3px 0;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.alert-logic-item svg{flex-shrink:0;margin-top:1px}

/* ═══ EMPTY / SEASONAL STATE ═══ */
.empty-state{
  text-align:center;padding:48px 20px;
  animation:reveal .5s var(--ease-out) .1s both;
}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:.5}
.empty-title{font-family:var(--font-display);font-size:24px;color:var(--white);margin-bottom:8px}
.empty-body{font-size:13px;color:var(--text2);line-height:1.7;max-width:320px;margin:0 auto 20px}
.empty-countdown{font-size:13px;color:var(--accent);margin-bottom:20px}

/* ═══ RESORT DETAIL OVERLAY ═══ */
.detail-overlay{
  position:fixed;inset:0;z-index:700;
  background:var(--overlay);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .3s var(--ease-std);
}
.detail-overlay.open{opacity:1;pointer-events:auto}
.detail-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:710;
  max-height:90dvh;overflow-y:auto;
  background:var(--bg);border-top:1px solid var(--border);
  border-radius:var(--r) var(--r) 0 0;
  padding:16px 20px calc(20px + env(safe-area-inset-bottom,0px));
  max-width:520px;margin:0 auto;
  transform:translateY(100%);transition:transform .38s var(--ease-spring);
}
.detail-overlay.open .detail-sheet{transform:translateY(0)}
.sheet-handle{
  width:36px;height:4px;background:var(--border2);border-radius:2px;
  margin:0 auto 16px;
}
.sheet-close{
  position:absolute;top:16px;right:20px;width:32px;height:32px;
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  color:var(--text3);font-size:16px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .15s;
}
.sheet-close:hover{color:var(--text);border-color:var(--text3)}

/* ═══ FORECAST STRIP ═══ */
.forecast-strip{
  display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;
  padding:8px 0;margin:12px 0 20px;-webkit-overflow-scrolling:touch;
}
.forecast-strip::-webkit-scrollbar{height:2px}
.forecast-day{
  flex-shrink:0;width:80px;scroll-snap-align:start;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px 8px;text-align:center;
}
.forecast-day.today{border-color:var(--accent);background:var(--accent-soft)}
.fd-name{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fd-icon{margin:4px 0;display:flex;justify-content:center}
.fd-icon svg{width:20px;height:20px}
.fd-temps{font-size:11px;color:var(--white);margin:4px 0}
.fd-temps span{color:var(--text3);font-size:10px}
.fd-wind{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:2px;justify-content:center}
.fd-snow{font-size:10px;color:var(--sky);font-weight:500;margin-top:2px}

/* ── HOURLY TABLE ── */
.hourly-wrap{margin:24px 0}
.hourly-title{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.hourly-strip{
  display:flex;gap:6px;overflow-x:auto;scroll-snap-type:x mandatory;
  padding:4px 0;-webkit-overflow-scrolling:touch;
}
.hourly-strip::-webkit-scrollbar{height:2px}
.hourly-cell{
  flex-shrink:0;width:48px;scroll-snap-align:start;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-xs);padding:6px 4px;text-align:center;
  font-size:10px;
}
.hc-hour{color:var(--text3);margin-bottom:2px}
.hc-temp{color:var(--white);font-weight:500;font-size:10px}
.hc-wind{color:var(--text2);margin-top:1px}
.hc-snow{color:var(--sky);font-weight:500;margin-top:1px}

/* ── WEEK OUTLOOK ── */
.week-outlook{margin:24px 0}
.week-outlook-title{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.week-row{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-xs);margin-bottom:6px;font-size:11px;
}
.wr-label{min-width:80px;color:var(--text2)}
.wr-range{flex:1;color:var(--white);font-weight:500}
.wr-trend{font-size:10px;padding:2px 6px;border-radius:3px}
.wr-trend.up{background:var(--fresh-soft);color:var(--fresh)}
.wr-trend.flat{background:var(--accent-soft);color:var(--accent)}
.wr-trend.down{background:var(--danger-soft);color:var(--danger)}

/* ═══ PROFILE SECTION ═══ */
.profile-section{padding:24px 0}
.profile-field{margin-bottom:16px;position:relative}
.profile-field label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px}
.profile-input{
  width:100%;padding:12px 14px;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:12px;
  border-radius:var(--r-sm);outline:none;transition:border-color .15s;
}
.profile-input:focus{border-color:var(--accent)}
.profile-input::placeholder{color:var(--text3)}
.profile-save-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:8px 16px;background:var(--accent);color:var(--bg);
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  border:none;border-radius:var(--r-sm);margin-top:8px;transition:opacity .15s;
}
.profile-save-btn:hover{opacity:.85}

/* ── LOCATION AUTOCOMPLETE ── */
.loc-suggest{
  position:absolute;top:100%;left:0;right:0;z-index:500;
  background:var(--card);border:1px solid var(--border);
  border-radius:0 0 var(--r-sm) var(--r-sm);
  max-height:200px;overflow-y:auto;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  display:none;
}
.loc-suggest.show{display:block}
.loc-suggest-item{
  padding:10px 14px;font-size:11px;color:var(--text2);
  cursor:pointer;transition:all .1s;border-bottom:1px solid var(--border);
}
.loc-suggest-item:last-child{border-bottom:none}
.loc-suggest-item:hover{background:var(--accent-soft);color:var(--accent)}
.loc-suggest-item.loc-geo{color:var(--text2);display:flex;align-items:center;gap:6px}
.loc-suggest-item.loc-geo svg{flex-shrink:0;opacity:.6}
.loc-suggest-item.loc-loading{color:var(--text3);pointer-events:none;font-style:italic}
.loc-suggest-item.loc-no-result{color:var(--text3);pointer-events:none}

.skill-row{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  padding:10px 12px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);
}
.skill-name{font-size:12px;color:var(--text);min-width:90px}
.skill-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .6s var(--ease-out)}
.skill-val{font-size:11px;font-weight:500;color:var(--accent);min-width:32px;text-align:right}
.skill-btns{display:flex;gap:4px}
.skill-btn{
  width:32px;height:32px;background:var(--card2);border:1px solid var(--border);
  color:var(--text2);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
}
.skill-btn:hover{border-color:var(--accent);color:var(--accent)}
.skill-btn svg{width:14px;height:14px}
.level-card{
  padding:16px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:16px;
}
.level-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.level-name{font-family:var(--font-display);font-size:20px;color:var(--white)}
.level-desc{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.6}

/* ═══ ROUTINES & RESOURCES ═══ */
.routine-goal{font-size:11px;color:var(--accent);padding:6px 0 8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.routine-measure{font-size:10px;color:var(--fresh);padding:10px 0 4px;margin-top:8px;border-top:1px solid var(--border);display:flex;align-items:flex-start;gap:6px;line-height:1.5}
.routine-measure strong{color:var(--text);white-space:nowrap}
.routine-measure svg{flex-shrink:0;margin-top:2px}
.step-num{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;background:var(--border);color:var(--text);font-size:10px;font-weight:600;border-radius:50%;flex-shrink:0;font-family:var(--font-mono)}
.routine-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;
}
.routine-card:hover{border-color:var(--accent);transform:translateX(2px)}
.routine-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.routine-title{font-size:12px;font-weight:500;color:var(--white)}
.routine-dur{font-size:10px;color:var(--fresh);background:var(--fresh-soft);padding:2px 7px;border-radius:3px}
.routine-steps{list-style:none}
.routine-steps li{font-size:10px;color:var(--text2);padding:4px 0;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.routine-body{max-height:0;overflow:hidden;transition:max-height .25s var(--ease-std)}
.routine-card.open .routine-body{max-height:800px}

.res-link{
  display:flex;align-items:center;gap:10px;
  padding:9px 11px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);margin-bottom:6px;color:var(--text);transition:all .15s;
}
.res-link:hover{border-color:var(--accent);transform:translateX(2px);text-decoration:none}
.res-icon{flex-shrink:0;color:var(--accent)}
.res-icon svg{width:16px;height:16px}
.res-title{font-size:11px;font-weight:500}
.res-desc{font-size:10px;color:var(--text3);margin-top:1px}

/* ═══ BOTTOM NAV ═══ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  display:flex;justify-content:space-around;
  height:calc(60px + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:color-mix(in srgb,var(--surface) 94%,transparent);
  border-top:1px solid var(--border);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  transition:background .3s,border-color .3s;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;padding:6px 20px;
  color:var(--text3);cursor:pointer;text-decoration:none;
  transition:color .15s;position:relative;
}
.nav-item.active{color:var(--accent)}
.nav-item.active::before{
  content:'';position:absolute;top:0;width:24px;height:2px;
  background:var(--accent);border-radius:0 0 2px 2px;
}
.nav-icon{display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:20px;height:20px}
.nav-label{font-size:10px;letter-spacing:.5px}

/* ═══ TAB VISIBILITY ═══ */
.tab-section{display:none}
.tab-section.active-tab{display:block}

/* ── FORECAST BAR CHARTS ── */
.fc-bar-section{margin:20px 0 24px}
.fc-bar-legend{display:flex;gap:14px;margin-bottom:12px;font-size:10px;color:var(--text2)}
.fc-bar-legend-item{display:flex;align-items:center;gap:4px}
.fc-bar-legend-swatch{width:10px;height:10px;border-radius:2px}
.fc-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:10px}
.fc-bar-label{min-width:48px;color:var(--text2)}
.fc-bar-track{flex:1;height:16px;background:var(--card2);border-radius:3px;overflow:hidden;position:relative}
.fc-bar-fill{height:100%;border-radius:3px;transition:width .6s var(--ease-out);display:flex;align-items:center;padding-left:4px;font-size:8px;color:var(--white);white-space:nowrap}
.fc-bar-val{min-width:36px;text-align:right;font-weight:500}
.fc-bar-snow .fc-bar-fill{background:var(--sky)}
.fc-bar-wind .fc-bar-fill{background:var(--text3)}
.fc-temp-cold{color:var(--sky)}
.fc-temp-warm{color:var(--warn)}
.fc-temp-neutral{color:var(--text)}

/* ── FAVORITE RESORTS ── */
.fav-slots{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fav-slot{
  flex:1;min-width:120px;padding:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);text-align:center;
  font-size:11px;color:var(--text2);cursor:pointer;
  transition:all .15s;position:relative;
}
.fav-slot:hover{border-color:var(--accent);color:var(--accent)}
.fav-slot.filled{border-color:var(--accent);background:var(--accent-soft)}
.fav-slot .fav-name{font-size:12px;font-weight:500;color:var(--white)}
.fav-remove{
  position:absolute;top:4px;right:4px;width:18px;height:18px;
  background:var(--card2);border:1px solid var(--border);border-radius:50%;
  color:var(--text3);font-size:10px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .12s;
}
.fav-remove:hover{background:var(--danger-soft);color:var(--danger);border-color:var(--danger)}
.fav-dropdown{
  position:absolute;top:100%;left:0;right:0;z-index:500;
  background:var(--card);border:1px solid var(--border);
  border-radius:0 0 var(--r-sm) var(--r-sm);
  max-height:200px;overflow-y:auto;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);display:none;
}
.fav-dropdown.show{display:block}
.fav-search{
  width:100%;padding:8px 10px;background:var(--card2);border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:11px;outline:none;
}
.fav-option{
  padding:8px 10px;font-size:11px;color:var(--text2);cursor:pointer;
  transition:all .1s;border-bottom:1px solid var(--border);
}
.fav-option:last-child{border-bottom:none}
.fav-option:hover{background:var(--accent-soft);color:var(--accent)}

/* ── TRIP MAP ── */
.trip-map-wrap{border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border);margin:12px 0}
.trip-map-el{height:240px}

let geocodedOrigin=JSON.parse(localStorage.getItem('sbGeocodedOrigin')||'null');

function getOrigin(s){
  const k=s.toLowerCase().trim();
  // Check for 5-digit zip code
  if(/^\d{5}$/.test(k)&&ORIGINS[k])return ORIGINS[k];
  for(const[key,v]of Object.entries(ORIGINS)){if(k.includes(key))return v}
  // Use geocoded result if available and matches current location
  if(geocodedOrigin&&(geocodedOrigin.query===k||k.includes(geocodedOrigin.query?.split(',')[0])||geocodedOrigin.query?.includes(k.split(',')[0])))return geocodedOrigin;
  // Fall back to nearest known origin by partial match
  return ORIGINS['san francisco'];
}

function distMiles(a,b){const R=3959,dL=(b.lat-a.lat)*Math.PI/180,dN=(b.lng-a.lng)*Math.PI/180;const x=Math.sin(dL/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}

// Dynamic translation cache for content not in T object
const transCache=JSON.parse(localStorage.getItem('sbTransCache')||'{}');
async function translateText(text,targetLang){
  if(targetLang==='en')return text;
  const cacheKey=targetLang+':'+text.substring(0,60);
  if(transCache[cacheKey])return transCache[cacheKey];
  try{
    const langMap={zh:'zh-CN',ja:'ja'};
    const tl=langMap[targetLang]||targetLang;
    const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.substring(0,500))}&langpair=en|${tl}`);
    const data=await res.json();
    if(data.responseStatus===200&&data.responseData.translatedText){
      const translated=data.responseData.translatedText;
      transCache[cacheKey]=translated;
      localStorage.setItem('sbTransCache',JSON.stringify(transCache));
      return translated;
    }
  }catch(e){console.warn('Translation error:',e);}
  return text;
}

// Translate an element's text content dynamically
async function translateEl(el,text){
  if(lang==='en'){el.textContent=text;return;}
  el.textContent=text;
  const translated=await translateText(text,lang);
  el.textContent=translated;
}

// ── WEATHER CACHE & API (Fix 1) ──
const weatherCache = {};
const WEATHER_CACHE_TTL = 5 * 60 * 1000; // 5 minutes — always pull fresh data on new page load

async function fetchWeather(lat, lng) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=temperature_2m,windspeed_10m,snowfall,weathercode&daily=temperature_2m_max,temperature_2m_min,windspeed_10m_max,snowfall_sum,weathercode&timezone=auto&forecast_days=7&temperature_unit=fahrenheit&windspeed_unit=mph`;
  const res = await fetch(url);
  return res.json();
}

async function fetchSnowDepth(lat, lng) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=snow_depth&timezone=auto&forecast_days=1`;
  const res = await fetch(url);
  return res.json();
}

function getCachedWeather(resortId) {
  const c = weatherCache[resortId];
  if (c && (Date.now() - c.ts) < WEATHER_CACHE_TTL) return c.data;
  return null;
}

function weatherCodeToIcon(code) {
  if (code <= 1) return 'w-sunny';
  if (code <= 3) return 'w-partly-cloudy';
  if (code <= 49) return 'w-cloudy';
  if (code >= 71 && code <= 77) return 'w-snow';
  if (code >= 85) return 'w-heavy-snow';
  return 'w-cloudy';
}

async function loadWeatherForResorts(resorts) {
  // Update badge to "Updating..."
  const badge = document.getElementById('dataBadge');
  if (badge) { badge.textContent = t('updating'); badge.style.color = 'var(--sky)'; badge.style.background = 'var(--sky-soft)'; }

  const promises = resorts.map(async (r) => {
    if (getCachedWeather(r.id)) return;
    try {
      const [weather, snowDepth] = await Promise.all([
        fetchWeather(r.lat, r.lng),
        fetchSnowDepth(r.lat, r.lng)
      ]);
      weatherCache[r.id] = { data: { weather, snowDepth }, ts: Date.now() };
    } catch (e) {
      console.warn('Weather fetch failed for', r.name, e);
    }
  });

  await Promise.allSettled(promises);

  // Update badge to "Live Data"
  if (badge) {
    const anyLoaded = resorts.some(r => getCachedWeather(r.id));
    if (anyLoaded) {
      badge.textContent = t('live_data');
      badge.style.color = 'var(--fresh)';
      badge.style.background = 'var(--fresh-soft)';
      badge.style.animation = 'none';
      const dot = badge.querySelector('::before');
    } else {
      badge.textContent = t('demo_data');
    }
  }
}

function getWeatherForecast(r) {
  const cached = getCachedWeather(r.id);
  if (!cached) return generateForecast(r); // fallback to demo
  const w = cached.weather;
  if (!w.daily) return generateForecast(r);
  const days = [];
  for (let i = 0; i < 7 && i < w.daily.time.length; i++) {
    const d = new Date(w.daily.time[i] + 'T12:00:00');
    const dayName = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : d.toLocaleDateString('en-US', { weekday: 'short' });
    days.push({
      dayName,
      date: d,
      high: Math.round(w.daily.temperature_2m_max[i]),
      low: Math.round(w.daily.temperature_2m_min[i]),
      wind: Math.round(w.daily.windspeed_10m_max[i]),
      snowfall: Math.round((w.daily.snowfall_sum[i] || 0) * 0.394), // cm to inches approx
      condition: weatherCodeToIcon(w.daily.weathercode[i])
    });
  }
  return days;
}

function getWeatherHourly(r) {
  const cached = getCachedWeather(r.id);
  if (!cached) return generateHourly(r);
  const w = cached.weather;
  if (!w.hourly) return generateHourly(r);
  const hours = [];
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  for (let h = 0; h < 24; h++) {
    const idx = w.hourly.time.findIndex(t => t.startsWith(todayStr) && new Date(t).getHours() === h);
    if (idx >= 0) {
      hours.push({
        hour: h,
        temp: Math.round(w.hourly.temperature_2m[idx]),
        wind: Math.round(w.hourly.windspeed_10m[idx]),
        snow: Math.round((w.hourly.snowfall[idx] || 0) * 0.394 * 10) / 10
      });
    } else {
      hours.push({ hour: h, temp: '--', wind: '--', snow: 0 });
    }
  }
  return hours;
}

function getFresh24h(r) {
  const cached = getCachedWeather(r.id);
  if (!cached) return r.fresh;
  const w = cached.weather;
  if (!w.hourly || !w.hourly.snowfall) return r.fresh;
  const now = new Date();
  let total = 0;
  for (let i = Math.max(0, w.hourly.snowfall.length - 24); i < w.hourly.snowfall.length; i++) {
    total += (w.hourly.snowfall[i] || 0);
  }
  const inches = Math.round(total * 0.394);
  return inches > 0 ? inches : r.fresh; // fallback to demo if API returns 0
}

function getBaseDepth(r) {
  const cached = getCachedWeather(r.id);
  if (!cached || !cached.snowDepth) return r.base;
  const sd = cached.snowDepth;
  if (!sd.hourly || !sd.hourly.snow_depth) return r.base;
  const depths = sd.hourly.snow_depth.filter(v => v !== null && v !== undefined);
  if (depths.length === 0) return r.base;
  const latestCm = depths[depths.length - 1];
  const inches = Math.round(latestCm * 0.394);
  return inches > 0 ? inches : r.base; // fallback to demo if 0
}

function isLiveData(r) {
  return !!getCachedWeather(r.id);
}

// ── ROUTE CACHE (Fix 7) ──
const routeCache = {};

async function fetchRoute(origin, dest) {
  const key = `${origin.lat},${origin.lng}-${dest.lat},${dest.lng}`;
  if (routeCache[key]) return routeCache[key];
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${dest.lng},${dest.lat}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.routes && data.routes[0]) {
      const route = data.routes[0];
      const hours = Math.floor(route.duration / 3600);
      const mins = Math.round((route.duration % 3600) / 60);
      const miles = Math.round(route.distance * 0.000621371);
      routeCache[key] = { duration: route.duration, hours, mins, miles, driveStr: `${hours}h ${mins}m`, geometry: route.geometry };
      return routeCache[key];
    }
  } catch (e) { console.warn('Route fetch failed', e); }
  return null;
}

async function loadRoutesForResorts(resorts) {
  const origin = getOrigin(userLocation);
  const promises = resorts.filter(r => r.travel && r.travel.dist < 800).map(async (r) => {
    const route = await fetchRoute(origin, { lat: r.lat, lng: r.lng });
    if (route) {
      // Update drive time displays in the DOM
      const card = document.querySelector(`[data-resort="${r.id}"]`);
      if (card) {
        const driveCells = card.querySelectorAll('.drive-val');
        if (driveCells.length >= 2) {
          driveCells[1].textContent = route.driveStr;
        }
        // Also update the rec-sub line
        const sub = card.querySelector('.rec-sub');
        if (sub && !r.travel.flightStr) {
          sub.innerHTML = sub.innerHTML.replace(r.travel.driveStr + ' ' + t('drive'), route.driveStr + ' ' + t('drive'));
        }
      }
    }
  });
  await Promise.allSettled(promises);
}

// ── SCORING (Fixed granular travel score) ──
function scoreResort(r,origin){
  if(r.status==='CLOSED')return 0;
  const dist=distMiles(origin,{lat:r.lat,lng:r.lng});
  const snowScore=Math.min(r.fresh*2.5+r.base*0.08,40);
  const weatherScore=r.fresh>0?18:12;
  let travelScore;
  if(r.region==='intl'){travelScore=dist>5000?8:10}
  else if(dist<50) travelScore=25;
  else if(dist<500) travelScore=Math.round(25-dist/500*20); // linear: 25 at 0mi -> 5 at 500mi
  else travelScore=3;
  // Skill match bonus
  const lv=calcLevel(skillVals);
  let skillBonus=0;
  if(lv.key==='beginner'&&r.id==='bigbear')skillBonus=5;
  if(lv.key==='expert'&&(r.id==='snowbird'||r.id==='revelstoke'))skillBonus=5;
  if(lv.key==='intermediate'&&r.id==='brighton')skillBonus=3;
  const crowdScore=dist>500?8:r.fresh>10?6:10;
  // Favorite resort bonus — strong weight so user's picks rise to top
  const favs=JSON.parse(localStorage.getItem('sbFavorites')||'[]');
  const favoriteBonus=favs.includes(r.id)?15:0;
  return Math.round(Math.min(snowScore+weatherScore+travelScore+crowdScore+skillBonus+favoriteBonus,100));
}

function getTravelInfo(origin,r){
  const dist=Math.round(distMiles(origin,{lat:r.lat,lng:r.lng}));
  // Use road distance factor (~1.3x straight-line) and realistic avg speed (42mph incl mountain roads)
  const roadDist=dist*1.3;
  const hours=roadDist/42;const h=Math.floor(hours);const m=Math.round((hours-h)*60);
  const driveStr=`${h}h ${m}m`;
  let flightStr=null;
  if(r.region==='us'&&dist>400)flightStr='SLC ~1h 40m + drive';
  if(r.id==='niseko')flightStr='NRT ~10h + 2.5h drive';
  if(r.id==='revelstoke')flightStr='YLW ~2.5h + 2.5h drive';
  if(r.id==='chamonix'||r.id==='zermatt')flightStr='GVA ~11h + drive';
  if(r.id==='vallenevado')flightStr='SCL ~12h + 1.5h drive';
  if(r.id==='thredbo')flightStr='SYD ~15h + 5h drive';
  if(r.id==='tremblant')flightStr='YUL ~5h + 1.5h drive';
  const chainResorts=['palisades','mammoth','june','snowbird','brighton','solitude','alta'];
  const hasChain=chainResorts.includes(r.id);
  return{dist,driveStr,flightStr,hasChain,driveHours:hours}
}

// ── GENERATE DEMO FORECAST DATA ──
function generateForecast(r){
  const days=[];
  const now=new Date();
  const conditions=['w-snow','w-heavy-snow','w-partly-cloudy','w-cloudy','w-sunny','w-snow','w-partly-cloudy'];
  const baseTemp=r.elev>10000?18:r.elev>8000?24:30;
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()+i);
    const dayName=i===0?t('today_label'):i===1?t('tomorrow_label'):d.toLocaleDateString(lang==='zh'?'zh-CN':lang==='ja'?'ja-JP':'en-US',{weekday:'short'});
    const high=baseTemp+Math.round(Math.random()*10-3);
    const low=high-Math.round(8+Math.random()*6);
    const windBase=r.elev>10000?15:10;
    const wind=windBase+Math.round(Math.random()*12);
    const snowfall=i<3?Math.round(r.fresh/(i+1)*0.6+Math.random()*4):Math.round(Math.random()*3);
    days.push({dayName,date:d,high,low,wind,snowfall,condition:conditions[i]});
  }
  return days;
}

function generateHourly(r){
  const hours=[];
  const baseTemp=r.elev>10000?16:r.elev>8000?22:28;
  for(let h=0;h<24;h++){
    const temp=baseTemp+Math.round(Math.sin((h-14)*Math.PI/12)*6+Math.random()*3);
    const wind=8+Math.round(Math.random()*15);
    const snow=h>=2&&h<=10?Math.round(Math.random()*2*10)/10:0;
    hours.push({hour:h,temp,wind,snow});
  }
  return hours;
}

function generateWeekOutlook(r){
  const baseFall=r.fresh>10?r.fresh:6;
  return [
    {label:'This Week',low:Math.round(baseFall*0.8),high:Math.round(baseFall*1.4),trend:'up'},
    {label:'Next Week',low:Math.round(baseFall*0.3),high:Math.round(baseFall*0.7),trend:'flat'},
    {label:'Week 3',low:Math.round(baseFall*0.5),high:Math.round(baseFall*1.1),trend:'up'}
  ];
}

// ── RENDER: NEXT TRIP (3-week outlook with 3 resorts per week) ──
function renderNextTrip(){
  const now=new Date();
  const origin=getOrigin(userLocation);
  document.getElementById('nextTripTitle').innerHTML=`${icon('calendar',18)} ${t('plan_next')}`;
  const ntSub=document.getElementById('nextTripTitle').parentElement.querySelector('.zone-subtitle');
  if(ntSub)ntSub.textContent=t('best_windows');
  const scored=RESORTS.filter(r=>r.status!=='CLOSED').map(r=>({...r,score:scoreResort(r,origin)})).sort((a,b)=>b.score-a.score);
  const weeks=[];
  for(let w=1;w<=3;w++){
    const weekStart=new Date(now);weekStart.setDate(weekStart.getDate()+w*7);
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekEnd.getDate()+6);
    const loc=lang==='zh'?'zh-CN':lang==='ja'?'ja-JP':'en-US';
    const startStr=weekStart.toLocaleDateString(loc,{month:'short',day:'numeric'});
    const endStr=weekEnd.toLocaleDateString(loc,{month:'short',day:'numeric'});
    // Week 1: use real 7-day forecast data if available
    let snowChance, expectedSnow, trend;
    if(w===1){
      // Compute from actual Open-Meteo 7-day forecast for top resort
      const topR=scored[0];
      const forecast=getWeatherForecast(topR);
      const snowDays=forecast.filter(d=>d.snowfall>0).length;
      const totalSnow=forecast.reduce((s,d)=>s+d.snowfall,0);
      snowChance=Math.round((snowDays/Math.max(forecast.length,1))*100);
      expectedSnow=totalSnow>0?`${Math.round(totalSnow*0.7)}-${Math.round(totalSnow*1.3)}"`:t('trace');
      trend=totalSnow>=8?'up':totalSnow>=3?'steady':'down';
    } else {
      // Weeks 2-3: projection based on seasonal averages (no API data available beyond 7 days)
      snowChance=w===2?45:30;
      expectedSnow=w===2?'4-8"':'2-6"';
      trend=w===2?'steady':'down';
    }
    const trendIcon=trend==='up'?icon('chevron-up',12):trend==='down'?icon('chevron-down',12):'\u2192';
    const trendColor=trend==='up'?'var(--fresh)':trend==='down'?'var(--warn)':'var(--text2)';
    const top3=scored.slice(w===1?0:w===2?1:2, w===1?3:w===2?4:5);
    const isLive=w===1&&scored.length>0&&getCachedWeather(scored[0].id);
    weeks.push({weekLabel:`${t('week')}${lang==='en'?' ':''}${w}`,dateRange:`${startStr} \u2013 ${endStr}`,snowChance,expectedSnow,trend,trendIcon,trendColor,top3,isLive,weekNum:w});
  }
  document.getElementById('nextTripContent').innerHTML=weeks.map(w=>`
    <div class="outlook-row" style="flex-wrap:wrap">
      <div class="outlook-week">${w.weekLabel}</div>
      <div class="outlook-info">
        <div class="outlook-title">${w.dateRange}${w.isLive?' <span style="font-size:10px;color:var(--fresh);font-weight:600">LIVE ~85%</span>':w.weekNum===2?' <span style="font-size:10px;color:var(--text3);font-weight:500">~60% '+t("accuracy")+'</span>':w.weekNum===3?' <span style="font-size:10px;color:var(--text3);font-weight:500">~40% '+t("accuracy")+'</span>':''}</div>
        <div class="outlook-detail">${w.snowChance}% ${t('snow_chance')} &middot; ${w.expectedSnow} ${t('expected')}</div>
        <div style="margin-top:6px">
          ${w.top3.map(r=>{
            const regionTag=r.region==='ca'?'CA':r.region==='us'?'US':'INTL';
            const tagClass=r.region==='ca'?'cat-ca':r.region==='us'?'cat-us':'cat-intl';
            return `<div class="outlook-resort-row" onclick="scrollToResort('${r.id}');event.stopPropagation()">
              <span class="outlook-region-tag ${tagClass}">${regionTag}</span>
              <a href="${r.links.snow}" target="_blank" onclick="event.stopPropagation()" style="color:var(--white);text-decoration:none;font-weight:700">${r.name}</a>
              <span>&middot; ${t('score_label')} ${r.score} &middot; ${getFresh24h(r)}" ${t('fresh')}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="outlook-trend" style="color:${w.trendColor}">${w.trendIcon} ${w.expectedSnow}</div>
    </div>`).join('')+`
    <div class="wx-source" style="margin-top:6px">${icon('external-link',10)} ${t('week')}${lang==='en'?' ':''}1: <a href="https://open-meteo.com" target="_blank">Open-Meteo ${t('live_data')}</a> &middot; ${t('week')}${lang==='en'?' ':''}2-3: ${t('seasonal_projection')}</div>`;
}

function scrollToResort(id){
  // Show all resorts first so we can find it
  showAllResorts=true;
  renderAllResorts();
  setTimeout(()=>{
    const el=document.querySelector(`.resort-row[data-resort-id="${id}"]`);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.borderColor='var(--accent)';setTimeout(()=>{el.style.borderColor=''},2000);}
    else openDetail(id);
  },100);
}

function getResortNarrative(r){
  if(r.region==='intl'){
    if(r.id==='niseko')return t('niseko_narrative');
    if(r.id==='revelstoke')return t('revelstoke_narrative');
    if(r.id==='chamonix')return t('chamonix_narrative');
    if(r.id==='zermatt')return t('zermatt_narrative');
  }
  const fresh=getFresh24h(r), base=getBaseDepth(r);
  if(fresh>=15)return`<strong>${fresh}" ${tq(r.quality).toLowerCase()}</strong> ${t('makes_powder_day')} ${r.liftsOpen}/${r.lifts} ${t('lifts')}. <span data-translate="${r.ann.replace(/"/g,'&quot;')}">${r.ann}</span>`;
  if(fresh>=8)return`${t('narrative_solid')} <strong>${fresh}" ${t('solid_overnight')}</strong>. ${tq(r.quality)} ${t('conditions_across')} ${r.trailsOpen}/${r.trails} ${t('trails_open')} <span data-translate="${r.ann.replace(/"/g,'&quot;')}">${r.ann}</span>`;
  return`${tq(r.quality)} ${t('conditions_with_base')} ${base}" ${t('narrative_base')} ${r.trailsOpen}/${r.trails} ${t('trails_open')} <span data-translate="${r.ann.replace(/"/g,'&quot;')}">${r.ann}</span>`;
}

// ── RENDER: ALL RESORTS (top 10 + show more, grouped by status when expanded) ──
function renderAllResorts(){
  const origin=getOrigin(userLocation);
  const scored=RESORTS.map(r=>({...r,score:scoreResort(r,origin),travel:getTravelInfo(origin,r)})).sort((a,b)=>b.score-a.score);

  renderLegend();

  if(!showAllResorts){
    // Show top 10 by score
    const toShow=scored.slice(0,10);
    document.getElementById('allResorts').innerHTML=toShow.map(r=>renderResortRow(r)).join('');
    document.getElementById('showMoreWrap').innerHTML=`<button class="show-more-btn" onclick="showAllResorts=true;renderAllResorts()">${icon('chevron-down',14)} ${t('show_all')} ${scored.length} ${t('resorts')}</button>`;
  } else {
    // Group by status: EPIC, PRIME, GOOD, LIMITED, CLOSED
    const statusOrder=['EPIC','PRIME','GOOD','LIMITED','CLOSED'];
    const statusColors={EPIC:'var(--fresh)',PRIME:'var(--sky)',GOOD:'var(--accent)',LIMITED:'var(--warn)',CLOSED:'var(--text3)'};
    let html='';
    statusOrder.forEach(status=>{
      const group=scored.filter(r=>r.status===status);
      if(group.length===0)return;
      html+=`<div class="status-group-header" style="color:${statusColors[status]}">${t(status.toLowerCase())} (${group.length})</div>`;
      html+=group.map(r=>renderResortRow(r)).join('');
    });
    document.getElementById('allResorts').innerHTML=html;
    document.getElementById('showMoreWrap').innerHTML=`<button class="show-more-btn" onclick="showAllResorts=false;renderAllResorts()">${icon('chevron-up',14)} ${t('show_less')}</button>`;
  }
}

function renderResortRow(r){
  const chipClass=r.status==='EPIC'?'ch-epic':r.status==='PRIME'?'ch-prime':r.status==='GOOD'?'ch-good':r.status==='LIMITED'?'ch-limited':'ch-closed';
  const bgClass=r.status==='EPIC'?'status-bg-epic':r.status==='PRIME'?'status-bg-prime':r.status==='GOOD'?'status-bg-good':r.status==='LIMITED'?'status-bg-limited':'status-bg-closed';
  const travelLine=r.travel.flightStr?icon('plane',10)+' '+r.travel.flightStr:r.travel.driveStr;
  return`<div class="resort-row ${bgClass}${r.status==='CLOSED'?' closed-resort':''}" data-resort-id="${r.id}" onclick="openDetail('${r.id}')">
    <div class="rr-info"><div class="rr-name">${r.name}</div><div class="rr-meta">${icon('cloud-snow',10)} ${getFresh24h(r)}" ${t('fresh')} &middot; ${travelLine} &middot; Ikon: ${r.ikonDays}</div></div>
    <div class="rr-chip ${chipClass}">${t(r.status.toLowerCase())}</div>
    <div class="rr-score"${r.status==='CLOSED'?' style="color:var(--text3)"':''}>${r.status==='CLOSED'?'\u2014':r.score}</div>
  </div>`;
}

  // Init trip map
  setTimeout(()=>{
    const el=document.getElementById('trip-map');
    if(el&&!el._leaflet_id)initTripMap(el,r);
  },300);

function initTripMap(el,r){
  const origin=getOrigin(userLocation);
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const map=L.map(el,{center:[(origin.lat+r.lat)/2,(origin.lng+r.lng)/2],zoom:7,zoomControl:false,attributionControl:false});
  L.tileLayer(dark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:18}).addTo(map);
  L.circleMarker([origin.lat,origin.lng],{radius:6,fillColor:'#c4956a',color:'#fff',weight:2,fillOpacity:1}).addTo(map).bindPopup(getOrigin(userLocation).name);
  L.circleMarker([r.lat,r.lng],{radius:7,fillColor:'#6aafc4',color:'#fff',weight:2,fillOpacity:1}).addTo(map).bindPopup(r.name);
  const osrmUrl=`https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${r.lng},${r.lat}?overview=full&geometries=geojson`;
  fetch(osrmUrl).then(res=>res.json()).then(data=>{
    if(data.code==='Ok'&&data.routes&&data.routes[0]){
      const coords=data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
      L.polyline(coords,{color:'#c4956a',weight:3,opacity:.8}).addTo(map);
      map.fitBounds(L.polyline(coords).getBounds(),{padding:[20,20]});
    } else {
      tripFallback(map,origin,r);
    }
  }).catch(()=>tripFallback(map,origin,r));
  function tripFallback(map,origin,r){
    const mid=[(origin.lat+r.lat)/2+.15,(origin.lng+r.lng)/2-.2];
    L.polyline([[origin.lat,origin.lng],mid,[r.lat,r.lng]],{color:'#c4956a',weight:3,opacity:.8,dashArray:'8 4'}).addTo(map);
    map.fitBounds([[Math.min(origin.lat,r.lat)-.5,Math.min(origin.lng,r.lng)-.5],[Math.max(origin.lat,r.lat)+.5,Math.max(origin.lng,r.lng)+.5]],{padding:[20,20]});
  }
}

// ── LOCATION AUTOCOMPLETE (with Nominatim geocoding) ──
let geoDebounce=null;
function onLocationInput(){
  const input=document.getElementById('profileLocation');
  const suggest=document.getElementById('locSuggest');
  if(!input||!suggest)return;
  const val=input.value.toLowerCase().trim();
  if(val.length<1){suggest.classList.remove('show');return;}
  // First check local ORIGINS
  const seen=new Set();
  const matches=[];
  for(const[key,v]of Object.entries(ORIGINS)){
    if(seen.has(v.name))continue;
    if(v.name.toLowerCase().includes(val)||key.includes(val)){
      seen.add(v.name);
      matches.push({name:v.name,type:'local'});
    }
  }
  if(matches.length>0){
    showLocSuggestions(suggest,matches);
  } else {
    suggest.innerHTML=`<div class="loc-suggest-item loc-loading">${t('searching')||'Searching...'}</div>`;
    suggest.classList.add('show');
  }
  // Debounced Nominatim geocoding for unmatched input
  clearTimeout(geoDebounce);
  if(val.length>=2){
    geoDebounce=setTimeout(()=>geocodeNominatim(val,suggest,matches),400);
  }
}

function showLocSuggestions(suggest,matches){
  suggest.innerHTML=matches.slice(0,8).map(m=>{
    const esc=m.name.replace(/'/g,"\\'");
    if(m.type==='geo'){
      return `<div class="loc-suggest-item loc-geo" onmousedown="selectGeoLocation('${esc}',${m.lat},${m.lng})">${icon('map-pin',12)} ${m.name}</div>`;
    }
    return `<div class="loc-suggest-item" onmousedown="selectLocation('${esc}')">${m.name}</div>`;
  }).join('');
  suggest.classList.add('show');
}

async function geocodeNominatim(query,suggest,localMatches){
  try{
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&addressdetails=1`;
    const res=await fetch(url,{headers:{'Accept-Language':lang}});
    if(!res.ok)return;
    const data=await res.json();
    const geoMatches=data.map(d=>{
      const addr=d.address||{};
      const city=addr.city||addr.town||addr.village||addr.county||d.display_name.split(',')[0];
      const state=addr.state||'';
      const country=addr.country_code?addr.country_code.toUpperCase():'';
      let name=city;
      if(state)name+=', '+state;
      if(country&&country!=='US')name+=' ('+country+')';
      return {name,lat:parseFloat(d.lat),lng:parseFloat(d.lon),type:'geo'};
    });
    // Merge local + geo, deduplicate
    const allMatches=[...localMatches];
    const existing=new Set(localMatches.map(m=>m.name.toLowerCase()));
    for(const g of geoMatches){
      if(!existing.has(g.name.toLowerCase())){allMatches.push(g);existing.add(g.name.toLowerCase());}
    }
    if(allMatches.length>0){
      showLocSuggestions(suggest,allMatches);
    } else {
      suggest.innerHTML=`<div class="loc-suggest-item loc-no-result">${t('no_results')||'No results found'}</div>`;
      suggest.classList.add('show');
    }
  }catch(e){console.warn('Geocoding error:',e);}
}

function filterFavOptions(idx,val){

  const opts=document.getElementById('favOpts'+idx);

  const v=val.toLowerCase();
  opts.innerHTML=RESORTS.filter(r=>r.status!=='CLOSED'&&!favs.includes(r.id)&&r.name.toLowerCase().includes(v)).map(r=>`<div class="fav-option" onclick="event.stopPropagation();pickFav(${idx},'${r.id}')">${r.name}</div>`).join('');

function pickFav(idx,id){
  const favs=getFavorites();
  if(favs.length>=3||favs.includes(id))return;
  while(favs.length<=idx)favs.push(null);
  favs[idx]=id;
  setFavorites(favs.filter(Boolean));
  renderProfile();destroyMaps();renderAll();
}

function removeFav(idx){
  const favs=getFavorites();
  favs.splice(idx,1);
  setFavorites(favs);
  renderProfile();destroyMaps();renderAll();
}

// ── DESTROY MAPS (for re-render on location change) ──
function destroyMaps(){
  document.querySelectorAll('[id^="map-"],[id^="trip-map"]').forEach(el=>{
    if(el._leaflet_id){
      // Find the Leaflet map instance and remove it
      // Leaflet stores the map on the container
      const mapInst=Object.values(el).find(v=>v&&typeof v==='object'&&v._leaflet_id);
      try{
        // Use L.DomUtil to find the map
        if(el._leaflet){el._leaflet.remove();}
        else{
          // Brute force: clear the element and remove leaflet id
          el.innerHTML='';
          delete el._leaflet_id;
        }
      }catch(e){
        el.innerHTML='';
        delete el._leaflet_id;
      }
    }
  });
}

// ── CARD EXPAND/COLLAPSE ──
function toggleRec(card){

// ── MAP WITH OSRM ROUTING ──
function initResortMap(el){
  const id=el.id.replace('map-','');
  const r=RESORTS.find(x=>x.id===id);if(!r)return;
  const origin=getOrigin(userLocation);
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const map=L.map(el,{center:[38.5,-120],zoom:7,zoomControl:false,attributionControl:false});
  L.tileLayer(dark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:18}).addTo(map);

  // Origin and resort markers
  L.circleMarker([origin.lat,origin.lng],{radius:6,fillColor:'#c4956a',color:'#fff',weight:2,fillOpacity:1}).addTo(map).bindPopup(getOrigin(userLocation).name);
  L.circleMarker([r.lat,r.lng],{radius:7,fillColor:'#6aafc4',color:'#fff',weight:2,fillOpacity:1}).addTo(map).bindPopup(r.name);

  // Chain control markers
  const chainZones={mammoth:[[37.66,-119.02,'SR-203']],palisades:[[39.1,-120.31,'I-80']],june:[[37.78,-119.05,'US-395']],snowbird:[[40.58,-111.72,'Little Cottonwood']],brighton:[[40.6,-111.62,'Big Cottonwood']],solitude:[[40.61,-111.60,'Big Cottonwood']],alta:[[40.58,-111.66,'Little Cottonwood']]};
  if(chainZones[id]){chainZones[id].forEach(([lt,ln,name])=>{L.circleMarker([lt,ln],{radius:8,fillColor:'#d4a03a',color:'#fff',weight:2,fillOpacity:.9}).addTo(map).bindPopup(`<b>${icon('chain',12)} Chain Control</b><br>${name}`)})}

  // Attempt OSRM route
  const osrmUrl=`https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${r.lng},${r.lat}?overview=full&geometries=geojson`;
  fetch(osrmUrl).then(res=>res.json()).then(data=>{
    if(data.code==='Ok'&&data.routes&&data.routes[0]){
      const coords=data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
      L.polyline(coords,{color:'#c4956a',weight:3,opacity:.8}).addTo(map);
      map.fitBounds(L.polyline(coords).getBounds(),{padding:[20,20]});
    } else {
      drawFallbackLine(map,origin,r);
    }
  }).catch(()=>{
    drawFallbackLine(map,origin,r);
  });

  function drawFallbackLine(map,origin,r){
    const mid=[(origin.lat+r.lat)/2+.15,(origin.lng+r.lng)/2-.2];
    L.polyline([[origin.lat,origin.lng],mid,[r.lat,r.lng]],{color:'#c4956a',weight:3,opacity:.8,dashArray:'8 4'}).addTo(map);
    map.fitBounds([[Math.min(origin.lat,r.lat)-.5,Math.min(origin.lng,r.lng)-.5],[Math.max(origin.lat,r.lat)+.5,Math.max(origin.lng,r.lng)+.5]],{padding:[20,20]});
  }
}

// ── EMAIL ──
async function submitEmail(e){
  e.preventDefault();
  const form=document.getElementById('emailForm');
  const emailVal=document.getElementById('emailInput').value;
  const errorEl=document.getElementById('emailError');
  errorEl.style.display='none';
  const prefs=[];
  if(form.querySelector('[name="pref_powder"]')?.checked)prefs.push('powder_8in');
  if(form.querySelector('[name="pref_storm"]')?.checked)prefs.push('storm_12in');
  if(form.querySelector('[name="pref_epic"]')?.checked)prefs.push('epic_85');
  if(form.querySelector('[name="pref_weekly"]')?.checked)prefs.push('weekly_digest');
  const btn=form.querySelector('.email-btn');
  const origText=btn.textContent;
  btn.textContent=t('updating')||'Sending...';
  btn.disabled=true;
  const subData={email:emailVal,prefs,location:userLocation,favorites:getFavorites().join(', ')||'none set',date:new Date().toISOString()};
  // Try Formspree first, fall back to local save
  let submitted=false;
  try{
    const res=await fetch(form.action,{
      method:'POST',
      body:JSON.stringify({email:emailVal,_replyto:emailVal,_subject:'SlabHQ Powder Alert Signup',location:userLocation,favorites:subData.favorites,alert_prefs:prefs.join(', '),alert_schedule:'2-week advance, 7d/3d/1d follow-ups'}),
      headers:{'Accept':'application/json','Content-Type':'application/json'}
    });
    if(res.ok)submitted=true;
  }catch(err){}
  // Always save locally and show success
  localStorage.setItem('sbSubscribed',JSON.stringify(subData));
  form.style.display='none';
  const successEl=document.getElementById('emailSuccess');
  const origin=getOrigin(userLocation);
  const topResort=RESORTS.filter(r=>r.status!=='CLOSED').sort((a,b)=>scoreResort(b,origin)-scoreResort(a,origin))[0];
  const favNames=getFavorites().map(id=>RESORTS.find(r=>r.id===id)?.name).filter(Boolean);
  successEl.innerHTML=`
    <div style="text-align:center;margin-bottom:12px">${icon('check',20)}</div>
    <div style="font-family:var(--font-display);font-size:18px;color:var(--white);text-align:center;margin-bottom:4px">Welcome to Powder Alerts</div>
    <div style="font-size:11px;color:var(--text2);text-align:center;margin-bottom:16px">Thank you for subscribing, <strong style="color:var(--text)">${emailVal}</strong></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:12px">
      <div style="font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">${icon('cloud-snow',10)} Current Conditions Snapshot</div>
      ${topResort?`<div style="font-size:12px;color:var(--white);font-weight:500">${topResort.name}: ${topResort.fresh}" fresh, ${topResort.base}" base</div>
      <div style="font-size:10px;color:var(--text2);margin-top:2px">${topResort.liftsOpen}/${topResort.lifts} lifts open &middot; ${topResort.quality}</div>`:''}
      ${favNames.length?`<div style="font-size:10px;color:var(--text2);margin-top:8px;border-top:1px solid var(--border);padding-top:8px">${icon('star',10)} Tracking: <strong style="color:var(--text)">${favNames.join(', ')}</strong></div>`:''}
    </div>
    <div style="font-size:10px;color:var(--text3);text-align:center;line-height:1.6">
      ${icon('bell',10)} You'll receive alerts for: ${prefs.map(p=>p==='powder_8in'?'Powder days':p==='storm_12in'?'Storm alerts':p==='epic_85'?'Epic conditions':'Weekly digest').join(' &middot; ')}<br>
      First alert: 2 weeks before the next big storm
    </div>`;
  successEl.style.display='block';
}

// Auto-detect user location on first visit (no saved location)
if(!localStorage.getItem('sbOrigin')&&navigator.geolocation){
  navigator.geolocation.getCurrentPosition(async(pos)=>{
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&addressdetails=1`);
      const data=await res.json();
      const city=data.address.city||data.address.town||data.address.village||data.address.county||'';
      const state=data.address.state||'';
      const name=city&&state?`${city}, ${state}`:city||state||'Your Location';
      geocodedOrigin={lat:pos.coords.latitude,lng:pos.coords.longitude,name,query:name.toLowerCase()};
      localStorage.setItem('sbGeocodedOrigin',JSON.stringify(geocodedOrigin));
      userLocation=name;
      localStorage.setItem('sbOrigin',name);
      destroyMaps();renderAll();
    }catch(e){console.warn('Reverse geocode failed',e)}
  },()=>{},{ timeout: 5000 });
}

// Stage 2 & 3: fetch real weather data in background, then update UI
(async function initWeatherAndRoutes(){
  const origin=getOrigin(userLocation);
  const allOpen=RESORTS.filter(r=>r.status!=='CLOSED')
    .map(r=>({...r,score:scoreResort(r,origin)}))
    .sort((a,b)=>b.score-a.score);
  const top3=allOpen.slice(0,3);
  // Load top 3 first for fast initial render
  await loadWeatherForResorts(top3);
  // Re-render with live data
  renderWeatherOverview();
  renderTopPicks();
  // Load remaining open resorts in background so detail pages have fresh data
  const rest=allOpen.slice(3);
  if(rest.length)loadWeatherForResorts(rest).then(()=>{renderAll()});
  // Also load routes for top 3
  const origin2=getOrigin(userLocation);
  const top3WithTravel=top3.map(r=>({...r,travel:getTravelInfo(origin2,r)}));
  loadRoutesForResorts(top3WithTravel);
})();
</script>
