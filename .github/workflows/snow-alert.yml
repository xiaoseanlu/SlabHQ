name: Daily Snow Alert
on:
  schedule:
    - cron: '0 14 * * *'  # 6:00 AM PST (UTC-8) / 7:00 AM PDT (UTC-7)
  workflow_dispatch: {}     # manual trigger for testing

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check snow conditions and send alerts
        run: node scripts/check-snow-and-notify.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          SUBSCRIBERS_TOKEN: ${{ secrets.SUBSCRIBERS_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
      - name: Commit forecast snapshot
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/forecast-snapshot.json
          if git diff --staged --quiet; then
            echo "No snapshot file changes"
          else
            git commit -m "chore(data): update forecast snapshot from snow alert run" || true
            git push
          fi
